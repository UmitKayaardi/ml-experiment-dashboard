kind = "web"
previewPath = "/"
title = "ML Experiment Tracker"
version = "1.0.0"
id = "artifacts/ml-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21061
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ml-tracker run dev"

[services.env]
PORT = "21061"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ml-tracker", "run", "build"]
publicDir = "artifacts/ml-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
